name: T.A.N.G.O. — dagelijkse meting

on:
  schedule:
    - cron: "0 6 * * *"        # elke dag 06:00 UTC (≈ 08:00 BE zomertijd)
  workflow_dispatch:            # knop om handmatig te draaien

permissions:
  contents: write              # nodig om data.json terug te committen

jobs:
  meet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependencies
        run: pip install feedparser pillow requests

      - name: Meet de oranjegraad
        run: python orange_engine.py

      - name: Commit data.json
        run: |
          git config user.name  "orange-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet && echo "Niets gewijzigd" && exit 0
          git commit -m "T.A.N.G.O. update"
          git pull --rebase --autostash
          git push

          git diff --staged --quiet && echo "Niets gewijzigd" && exit 0
          git commit -m "Oranje-index update"
          git pull --rebase --autostash
          git push
